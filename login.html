<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPilot AI — Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            --primary-1: #7c3aed;
            --primary-2: #ec4899;
            --primary-3: #f59e0b;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1));
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .btn-primary:hover::after {
            opacity: 1;
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.35);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            border-color: rgba(124, 58, 237, 0.4);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.08);
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .bg-grid {
            background-image:
                linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .bg-radial-gradient {
            background: radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(236, 72, 153, 0.08) 0%, transparent 60%);
        }

        .hero-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 99999;
            background: rgba(10, 10, 30, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px 24px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            display: none;
            max-width: 400px;
        }
        .toast.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast .icon {
            font-size: 20px;
        }
        .toast.success .icon {
            color: #34d399;
        }
        .toast.error .icon {
            color: #f87171;
        }
        .toast.info .icon {
            color: #60a5fa;
        }
    </style>
</head>
<body class="p-6">

    <!-- Background aesthetics -->
    <div class="bg-grid absolute inset-0 pointer-events-none"></div>
    <div class="bg-radial-gradient absolute inset-0 pointer-events-none"></div>
    <div class="hero-orb" style="width:500px;height:500px;background:#7c3aed;top:-100px;left:-100px;"></div>
    <div class="hero-orb" style="width:400px;height:400px;background:#ec4899;bottom:-80px;right:-80px;"></div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast">
        <span class="icon"><i class="fas fa-check-circle"></i></span>
        <span id="toast-msg">Action completed</span>
    </div>

    <!-- Form Container -->
    <div class="glass relative z-10 w-full max-w-[450px] rounded-[24px] p-8 md:p-10">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-8 cursor-pointer" onclick="window.location.href='index.html'">
            <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#ec4899);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;">
                <i class="fas fa-rocket"></i>
            </div>
            <span style="font-weight:700;font-size:1.15rem;letter-spacing:-0.5px;">JobPilot <span style="color:#a78bfa;">AI</span></span>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <h3 class="text-2xl font-bold text-center mb-6">Welcome Back</h3>
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input class="form-input" id="login-email" type="email" placeholder="you@example.com">
            </div>
            <div class="mb-4">
                <div class="flex justify-between items-center mb-1.5">
                    <label class="form-label mb-0">Password</label>
                    <a onclick="showAuthForm('forgot')" class="text-xs text-[#a78bfa] cursor-pointer hover:underline">Forgot Password?</a>
                </div>
                <input class="form-input" id="login-password" type="password" placeholder="••••••••">
            </div>
            <div class="mb-6 flex items-center gap-2">
                <input type="checkbox" id="login-remember" style="accent-color:#7c3aed;cursor:pointer;">
                <label for="login-remember" class="text-sm text-slate-400 cursor-pointer select-none">Remember Me</label>
            </div>
            <button class="btn-primary w-full justify-center mb-6" onclick="submitLogin()"><i class="fas fa-sign-in-alt"></i> Log In</button>
            <p class="text-sm text-slate-500 text-center">Don't have an account? <a href="signup.html" class="text-[#a78bfa] font-semibold hover:underline">Sign Up</a></p>
        </div>

        <!-- Forgot Form -->
        <div id="forgot-form" style="display:none;">
            <h3 class="text-2xl font-bold text-center mb-2">Reset Password</h3>
            <p class="text-sm text-slate-400 text-center mb-6 leading-relaxed">Enter your email address and we'll send you a verification link.</p>
            <div class="mb-6">
                <label class="form-label">Email Address</label>
                <input class="form-input" id="forgot-email" type="email" placeholder="you@example.com">
            </div>
            <button class="btn-primary w-full justify-center mb-6" onclick="submitForgotPassword()"><i class="fas fa-paper-plane"></i> Send Link</button>
            <p class="text-sm text-slate-500 text-center"><a onclick="showAuthForm('login')" class="text-[#a78bfa] font-semibold cursor-pointer hover:underline">Back to Login</a></p>
        </div>

        <!-- Reset Password Form -->
        <div id="reset-form" style="display:none;">
            <h3 class="text-2xl font-bold text-center mb-6">Set New Password</h3>
            <div class="mb-4">
                <label class="form-label">Verification Token</label>
                <input class="form-input" id="reset-token" placeholder="Paste token here">
            </div>
            <div class="mb-6">
                <label class="form-label">New Password</label>
                <input class="form-input" id="reset-password" type="password" placeholder="••••••••">
            </div>
            <button class="btn-primary w-full justify-center mb-6" onclick="submitResetPassword()"><i class="fas fa-key"></i> Update Password</button>
            <p class="text-sm text-slate-500 text-center"><a onclick="showAuthForm('login')" class="text-[#a78bfa] font-semibold cursor-pointer hover:underline">Back to Login</a></p>
        </div>

        <!-- Back to Home Link -->
        <div class="mt-6 pt-4 border-t border-white/[0.04] text-center">
            <a href="index.html" class="text-xs text-slate-400 hover:text-white transition-colors duration-200"><i class="fas fa-arrow-left mr-1.5"></i> Back to Home</a>
        </div>
    </div>

    <!-- JS Handling -->
    <script>
        const API_BASE = (window.location.port !== '8080') ? 'http://localhost:8080' : '';
        function showToast(type, msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toast.className = 'toast show ' + type;
            toastMsg.innerText = msg;
            
            const icon = toast.querySelector('.icon i');
            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
            } else if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle';
            } else {
                icon.className = 'fas fa-info-circle';
            }

            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        function showAuthForm(type) {
            ['login-form', 'forgot-form', 'reset-form'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
            const form = document.getElementById(`${type}-form`);
            if (form) form.style.display = 'block';
        }

        async function submitLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('login-remember').checked;

            if (!email || !password) {
                showToast('error', 'Please fill in all login details.');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, rememberMe })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('accessToken', data.accessToken);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    
                    const user = {
                        id: data.id,
                        email: data.email,
                        firstName: data.firstName,
                        lastName: data.lastName,
                        role: data.role,
                        profilePhoto: data.profilePhoto
                    };
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    showToast('success', `Welcome back, ${user.firstName}!`);
                    
                    // Redirect to home dashboard
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    const err = await response.json();
                    showToast('error', err.error || 'Invalid credentials');
                }
            } catch (e) {
                showToast('error', 'Server connection failure.');
            }
        }

        async function submitForgotPassword() {
            const email = document.getElementById('forgot-email').value.trim();
            if (!email) {
                showToast('error', 'Email is required.');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    showToast('success', 'Reset token generated! Checking logs...');
                    showAuthForm('reset');
                } else {
                    showToast('error', 'Failed to generate token.');
                }
            } catch (e) {
                showToast('error', 'Connection issue.');
            }
        }

        async function submitResetPassword() {
            const token = document.getElementById('reset-token').value.trim();
            const newPassword = document.getElementById('reset-password').value;

            if (!token || !newPassword) {
                showToast('error', 'Token and password are required.');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                if (response.ok) {
                    showToast('success', 'Password reset successfully!');
                    showAuthForm('login');
                } else {
                    const err = await response.json();
                    showToast('error', err.error || 'Password update failed.');
                }
            } catch (e) {
                showToast('error', 'Connection issue.');
            }
        }

        // Initialize view based on query string
        const urlParams = new URLSearchParams(window.location.search);
        const formType = urlParams.get('form') || 'login';
        showAuthForm(formType);
    </script>
</body>
</html>
